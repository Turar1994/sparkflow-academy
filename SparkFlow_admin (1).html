<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SparkFlow Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060D1A;--bg2:#0A1628;--bg3:#0F2040;--bg4:#162a4a;
  --cyan:#00E5FF;--cyan2:#00BCD4;--cyan3:#80DEEA;
  --text:#E2E8F0;--textm:#94A3B8;--textd:#475569;
  --border:#1E3A5F;--border2:#0A2540;
  --green:#22C55E;--amber:#F59E0B;--red:#EF4444;
  --font:'Space Grotesk',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
input,textarea,select,button{font-family:var(--font)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* AUTH */
.auth{min-height:100vh;display:flex;align-items:center;justify-content:center}
.auth-box{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:38px;width:380px}
.auth-logo{text-align:center;margin-bottom:26px}
.auth-bolt{width:50px;height:50px;background:var(--cyan);border-radius:13px;display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:8px}
.auth-brand{font-size:18px;font-weight:700;color:#fff}
.auth-brand span{color:var(--cyan)}
.auth-badge{font-size:12px;color:var(--amber);margin-top:3px;font-weight:600}
.auth-title{font-size:16px;font-weight:600;color:#fff;text-align:center;margin-bottom:18px}
.fl{font-size:11px;font-weight:600;color:var(--textm);letter-spacing:.06em;display:block;margin-bottom:5px}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:14px;padding:11px 14px;border-radius:9px;margin-bottom:13px;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--cyan2)}
.fi::placeholder{color:var(--textd)}
.btn-login{width:100%;background:var(--cyan);color:var(--bg);font-size:15px;font-weight:700;padding:13px;border-radius:10px;border:none;cursor:pointer;transition:all .2s;margin-top:4px}
.btn-login:hover{background:var(--cyan3)}
.auth-err{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#FCA5A5;font-size:13px;padding:10px;border-radius:8px;margin-top:10px;display:none;text-align:center}

/* LAYOUT */
#app{display:none;min-height:100vh}
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,13,26,.95);border-bottom:1px solid var(--border2);backdrop-filter:blur(12px);display:flex;align-items:center;height:54px;padding:0 20px;gap:12px}
.tb-logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;color:#fff}
.tb-logo span{color:var(--cyan)}
.tb-badge{font-size:10px;font-weight:600;background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:var(--amber);padding:3px 8px;border-radius:99px}
.tb-nav{display:flex;gap:2px;padding:0 8px;flex:1;flex-wrap:wrap}
.tnav{background:none;border:none;color:var(--textm);font-size:13px;font-weight:500;padding:6px 10px;border-radius:6px;cursor:pointer;transition:all .15s}
.tnav:hover{color:var(--text);background:var(--bg3)}
.tnav.active{color:var(--cyan);background:rgba(0,229,255,.08)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.tb-student-link{font-size:12px;color:var(--textm);text-decoration:none;padding:5px 10px;border-radius:6px}
.tb-student-link:hover{color:var(--text)}
.btn-out{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#FCA5A5;font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer}

.layout{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 54px)}
.sidebar{background:var(--bg2);border-right:1px solid var(--border2);padding:14px 0;position:sticky;top:54px;max-height:calc(100vh - 54px);overflow-y:auto}
.sb-section{font-size:10px;font-weight:600;color:var(--textd);letter-spacing:.1em;padding:8px 14px 4px}
.sb-btn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 14px;background:none;border:none;border-left:2px solid transparent;color:var(--textm);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;text-align:left}
.sb-btn:hover{color:var(--text);background:var(--bg3)}
.sb-btn.active{color:var(--cyan);background:rgba(0,229,255,.06);border-left-color:var(--cyan)}
.sb-ico{font-size:15px;width:20px;text-align:center}
.content{padding:26px 28px;max-width:1000px}

/* COMMON */
.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.page-title{font-size:20px;font-weight:600;color:#fff}
.page-sub{font-size:13px;color:var(--textm);margin-top:3px}
.btn-primary{background:var(--cyan);color:var(--bg);font-size:13px;font-weight:700;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-primary:hover{background:var(--cyan3)}
.btn-save{background:var(--green);color:#fff;font-size:13px;font-weight:700;padding:9px 18px;border-radius:8px;border:none;cursor:pointer}
.btn-save:hover{background:#16A34A}
.btn-cancel{background:none;border:1px solid var(--border);color:var(--textm);font-size:13px;padding:9px 16px;border-radius:8px;cursor:pointer}
.btn-cancel:hover{border-color:var(--textm);color:var(--text)}
.btn-del{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#FCA5A5;font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer}
.btn-del:hover{background:rgba(239,68,68,.18)}
.btn-edit{background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.25);color:var(--cyan3);font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer}
.btn-edit:hover{background:rgba(0,229,255,.16)}

/* CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px}
.stat-card{background:var(--bg2);border:1px solid var(--border2);border-radius:11px;padding:15px}
.stat-val{font-size:26px;font-weight:700;color:var(--cyan)}
.stat-lbl{font-size:11px;color:var(--textm);margin-top:3px}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:18px;margin-bottom:14px}
.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-ico{width:24px;height:24px;background:rgba(0,229,255,.1);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px}

/* FORM */
.form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.form-group{flex:1;min-width:160px}
.form-group label{font-size:11px;font-weight:600;color:var(--textm);letter-spacing:.06em;display:block;margin-bottom:5px}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:13px;padding:9px 12px;border-radius:8px;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--cyan2)}
.form-input::placeholder{color:var(--textd)}
textarea.form-input{resize:vertical;min-height:80px;line-height:1.6}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg3);color:var(--textm);font-weight:600;padding:9px 12px;text-align:left;border-bottom:1px solid var(--border2);font-size:11px;letter-spacing:.05em}
td{padding:10px 12px;border-bottom:1px solid var(--border2);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}

/* PROGRESS */
.prog-bar{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;min-width:80px;display:inline-block;vertical-align:middle}
.prog-fill{height:100%;background:var(--cyan);border-radius:3px}
.badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:99px}
.badge-green{background:rgba(34,197,94,.12);color:var(--green)}
.badge-red{background:rgba(239,68,68,.12);color:#FCA5A5}
.badge-amber{background:rgba(245,158,11,.12);color:var(--amber)}

/* COLLAPSIBLE */
.coll{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;margin-bottom:8px;overflow:hidden}
.coll-head{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;transition:background .15s}
.coll-head:hover{background:var(--bg4)}
.coll-num{font-size:11px;font-weight:600;color:var(--cyan);width:28px;font-family:monospace}
.coll-title{font-size:13px;font-weight:600;color:var(--text);flex:1}
.coll-arr{font-size:10px;color:var(--textd);transition:transform .2s}
.coll-arr.open{transform:rotate(180deg)}
.coll-body{display:none;padding:14px;border-top:1px solid var(--border2)}
.coll-body.open{display:block}
.coll-sec{font-size:10px;font-weight:600;color:var(--textm);letter-spacing:.08em;margin-bottom:6px;margin-top:12px}
.coll-sec:first-child{margin-top:0}

/* QUIZ EDITOR */
.quiz-q-card{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:12px;margin-bottom:8px}
.quiz-q-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.quiz-opt-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.quiz-opt-letter{font-size:11px;font-weight:600;color:var(--textm);width:16px}
.quiz-radio{width:15px;height:15px;cursor:pointer;accent-color:var(--green);flex-shrink:0}

/* SLIDE PREVIEW */
.slide-preview{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;overflow:hidden;margin-top:10px}
.slide-preview-toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--border2)}
.slide-preview-frame{width:100%;height:400px;border:none}
.slide-status{display:flex;align-items:center;gap:6px;font-size:12px}
.slide-dot{width:8px;height:8px;border-radius:50%}

/* CERT PREVIEW */
.cert-prev{background:var(--bg);border:1px solid var(--border2);border-radius:12px;padding:30px;text-align:center;position:relative;overflow:hidden}
.cert-prev::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,229,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.03) 1px,transparent 1px);background-size:28px 28px}
.cert-corner{position:absolute;width:40px;height:40px;border-color:var(--cyan2);border-style:solid;opacity:.4}
.cert-tl{top:10px;left:10px;border-width:2px 0 0 2px}
.cert-tr{top:10px;right:10px;border-width:2px 2px 0 0}
.cert-bl{bottom:10px;left:10px;border-width:0 0 2px 2px}
.cert-br{bottom:10px;right:10px;border-width:0 2px 2px 0}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;z-index:999;background:var(--green);color:#fff;font-size:13px;font-weight:600;padding:11px 18px;border-radius:10px;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.err{background:var(--red)}

.info-box{background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.2);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--cyan3);margin-bottom:12px;line-height:1.6}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- AUTH -->
<div class="auth" id="authDiv">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-bolt">⚡</div>
      <div class="auth-brand">Spark<span>Flow</span></div>
      <div class="auth-badge">⚙ Админ кабинеті</div>
    </div>
    <div class="auth-title">Кіру</div>
    <label class="fl">ЛОГИН</label>
    <input class="fi" type="text" id="aLogin" placeholder="admin" autocomplete="off">
    <label class="fl">ПАРОЛЬ</label>
    <input class="fi" type="password" id="aPass" placeholder="Пароль" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-login" onclick="login()">Кіру →</button>
    <div class="auth-err" id="authErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tb-logo">⚡ Spark<span>Flow</span></div>
    <span class="tb-badge">АДМИН</span>
    <nav class="tb-nav">
      <button class="tnav active" onclick="showTab('dashboard')">📊 Басты</button>
      <button class="tnav" onclick="showTab('students')">👥 Студенттер</button>
      <button class="tnav" onclick="showTab('lessons')">📚 Сабақтар</button>
      <button class="tnav" onclick="showTab('quizzes')">⚡ Тесттер</button>
      <button class="tnav" onclick="showTab('slides')">📄 Слайдтар</button>
      <button class="tnav" onclick="showTab('videos')">▶ Видео</button>
      <button class="tnav" onclick="showTab('cert')">🎓 Сертификат</button>
      <button class="tnav" onclick="showTab('progress')">📈 Прогресс</button>
      <button class="tnav" onclick="showTab('points')">⭐ Балдар</button>
      <button class="tnav" onclick="showTab('settings')">⚙ Баптау</button>
    </nav>
    <div class="tb-right">
      <a class="tb-student-link" href="index.html" target="_blank">Студент сайты →</a>
      <button onclick="refreshAdminData()" title="Жаңарту" style="background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.2);color:#00E5FF;font-size:14px;padding:5px 11px;border-radius:7px;cursor:pointer" id="adminRefreshBtn">↻ Жаңарту</button>
      <button class="btn-out" onclick="logout()">Шығу</button>
    </div>
  </div>
  <div class="layout">
    <aside class="sidebar">
      <div class="sb-section">БАСҚАРУ</div>
      <button class="sb-btn active" onclick="showTab('dashboard')"><span class="sb-ico">📊</span>Басты бет</button>
      <button class="sb-btn" onclick="showTab('students')"><span class="sb-ico">👥</span>Студенттер</button>
      <button class="sb-btn" onclick="showTab('progress')"><span class="sb-ico">📈</span>Прогресс</button>
      <button class="sb-btn" onclick="showTab('points')"><span class="sb-ico">⭐</span>Балдар</button>
      <div class="sb-section">МАЗМҰН</div>
      <button class="sb-btn" onclick="showTab('lessons')"><span class="sb-ico">📚</span>Сабақтарды өңдеу</button>
      <button class="sb-btn" onclick="showTab('quizzes')"><span class="sb-ico">⚡</span>Тест сұрақтары</button>
      <button class="sb-btn" onclick="showTab('slides')"><span class="sb-ico">📄</span>Слайдтар (PDF)</button>
      <button class="sb-btn" onclick="showTab('videos')"><span class="sb-ico">▶</span>YouTube Видео</button>
      <button class="sb-btn" onclick="showTab('cert')"><span class="sb-ico">🎓</span>Сертификат</button>
      <div class="sb-section">ЖҮЙЕ</div>
      <button class="sb-btn" onclick="showTab('settings')"><span class="sb-ico">⚙</span>Баптаулар</button>
    </aside>
    <main class="content" id="mainContent"><p style="color:var(--textm)">Жүктелуде...</p></main>
  </div>
</div>

<script>
const FB='https://sparkflow-academy-default-rtdb.firebaseio.com';
async function fbGet(p){try{const r=await fetch(FB+p+'.json');return r.json();}catch(e){return null;}}
async function fbSet(p,d){try{await fetch(FB+p+'.json',{method:'PUT',body:JSON.stringify(d),headers:{'Content-Type':'application/json'}});}catch(e){}}
async function fbPush(p,d){try{const r=await fetch(FB+p+'.json',{method:'POST',body:JSON.stringify(d),headers:{'Content-Type':'application/json'}});return r.json();}catch(e){return null;}}
async function fbDel(p){try{await fetch(FB+p+'.json',{method:'DELETE'});}catch(e){}}
async function fbPatch(p,d){try{await fetch(FB+p+'.json',{method:'PATCH',body:JSON.stringify(d),headers:{'Content-Type':'application/json'}});}catch(e){}}


async function refreshAdminData(){
  const btn = document.getElementById('adminRefreshBtn');
  if(btn){ btn.textContent='↻ Жаңарту...'; btn.disabled=true; }
  await loadAll();
  const activeTab = document.querySelector('.tnav.active');
  if(activeTab){
    const onclick = activeTab.getAttribute('onclick')||'';
    const match = onclick.match(/showTab\('(\w+)'\)/);
    if(match) showTab(match[1]);
  }
  if(btn){ btn.textContent='↻ Жаңарту'; btn.disabled=false; }
}

function toast(msg,isErr=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(isErr?' err':'');
  setTimeout(()=>t.classList.remove('show'),3000);
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function login(){
  const lg=document.getElementById('aLogin').value.trim();
  const ps=document.getElementById('aPass').value.trim();
  const err=document.getElementById('authErr');
  err.style.display='none';
  if(!lg||!ps){err.textContent='Логин мен пароль енгізіңіз';err.style.display='block';return;}
  try{
    const creds=await fbGet('/adminCredentials');
    if(!creds||lg!==creds.login||ps!==creds.password){err.textContent='Логин немесе пароль қате';err.style.display='block';return;}
    document.getElementById('authDiv').style.display='none';
    document.getElementById('app').style.display='block';
    await loadAll();
    showTab('dashboard');
  }catch(e){err.textContent='Қате: '+e.message;err.style.display='block';}
}
function logout(){
  document.getElementById('authDiv').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('aPass').value='';
}

// ── DATA ──────────────────────────────────────────────────────────────────────
let STUDENTS={},PROGRESS={},COURSE=[],CERT_CONFIG={},SLIDES_CONFIG={};
async function loadAll(){
  const[s,p,c,cert,slides]=await Promise.all([
    fbGet('/students'),fbGet('/progress'),fbGet('/course'),
    fbGet('/certConfig'),fbGet('/slidesConfig')
  ]);
  STUDENTS=s||{};PROGRESS=p||{};COURSE=c||getDefaultCourse();
  CERT_CONFIG=cert||{schoolName:'SparkFlow Academy',courseName:'Электр инженериясы — нөлден практикалық дағдыларға дейін',duration:'4 апта · 20 сабақ',teacher:'SparkFlow Academy'};
  SLIDES_CONFIG=slides||{};
}

// ── TAB ───────────────────────────────────────────────────────────────────────
function showTab(tab){
  document.querySelectorAll('.tnav,.sb-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll(`[onclick="showTab('${tab}')"]`).forEach(b=>b.classList.add('active'));
  const m=document.getElementById('mainContent');
  const tabs={dashboard:renderDashboard,students:renderStudents,lessons:renderLessons,
    quizzes:renderQuizzes,slides:renderSlides,videos:renderVideos,
    cert:renderCertAdmin,progress:renderProgress,points:renderPoints,settings:renderSettings};
  if(tabs[tab]) tabs[tab](m);
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard(m){
  const sc=Object.keys(STUDENTS).length;
  let td=0;
  Object.values(PROGRESS).forEach(p=>Object.entries(p||{}).forEach(([k,v])=>{if(!k.includes('_quiz')&&v==='done')td++;}));
  m.innerHTML=`
    <div class="page-head"><div><div class="page-title">Басқару тақтасы</div><div class="page-sub">SparkFlow Academy</div></div></div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-val">${sc}</div><div class="stat-lbl">Студент</div></div>
      <div class="stat-card"><div class="stat-val">${td}</div><div class="stat-lbl">Аяқталған сабақтар</div></div>
      <div class="stat-card"><div class="stat-val">20</div><div class="stat-lbl">Жалпы сабақ</div></div>
      <div class="stat-card"><div class="stat-val">4</div><div class="stat-lbl">Апта</div></div>
    </div>
    <div class="card">
      <div class="card-title"><div class="card-ico">🚀</div>Жылдам әрекет</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn-primary" onclick="showTab('students')">+ Студент қосу</button>
        <button class="btn-primary" style="background:var(--bg3);color:var(--text);border:1px solid var(--border)" onclick="showTab('slides')">📄 Слайд қосу</button>
        <button class="btn-primary" style="background:var(--bg3);color:var(--text);border:1px solid var(--border)" onclick="showTab('videos')">▶ Видео қосу</button>
        <button class="btn-primary" style="background:var(--bg3);color:var(--text);border:1px solid var(--border)" onclick="showTab('cert')">🎓 Сертификат</button>
        <button class="btn-primary" style="background:var(--bg3);color:var(--text);border:1px solid var(--border)" onclick="showTab('progress')">📈 Прогресс</button>
      </div>
    </div>`;
}

// ── STUDENTS ──────────────────────────────────────────────────────────────────
function renderStudents(m){
  m.innerHTML=`
    <div class="page-head"><div><div class="page-title">Студенттер</div><div class="page-sub">Тіркеу, өзгерту, жою</div></div></div>
    <div class="card">
      <div class="card-title"><div class="card-ico">➕</div>Жаңа студент қосу</div>
      <div class="form-row">
        <div class="form-group"><label>АТЫ-ЖӨНІ</label><input class="form-input" id="sName" placeholder="Сырым Азиз"></div>
        <div class="form-group"><label>ЛОГИН</label><input class="form-input" id="sLogin" placeholder="syrymaziz"></div>
        <div class="form-group"><label>ПАРОЛЬ</label><input class="form-input" id="sPass" placeholder="Кемінде 6 символ" type="text"></div>
        <div style="padding-bottom:1px"><button class="btn-primary" onclick="addStudent()">Қосу</button></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><div class="card-ico">👥</div>Тіркелген студенттер (${Object.keys(STUDENTS).length})</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>АТЫ-ЖӨНІ</th><th>ЛОГИН</th><th>ПАРОЛЬ</th><th>ПРОГРЕСС</th><th>ТІРКЕЛГЕН</th><th>ӘРЕКЕТ</th></tr></thead>
        <tbody>${buildStudentRows()}</tbody>
      </table></div>
    </div>`;
}
function buildStudentRows(){
  const keys=Object.keys(STUDENTS);
  if(!keys.length)return'<tr><td colspan="6" style="text-align:center;color:var(--textd);padding:20px">Студент жоқ</td></tr>';
  return keys.map(uid=>{
    const s=STUDENTS[uid];
    const prog=PROGRESS[uid]||{};
    const done=Object.entries(prog).filter(([k,v])=>!k.includes('_quiz')&&v==='done').length;
    const pct=Math.round(done/20*100);
    return`<tr>
      <td style="font-weight:500;color:#fff">${s.name||'—'}</td>
      <td><code style="color:var(--cyan);font-size:12px">${s.login||'—'}</code></td>
      <td><code style="color:var(--textm);font-size:12px">${s.password||'—'}</code></td>
      <td><div style="display:flex;align-items:center;gap:7px"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div><span style="font-size:12px;color:var(--textm)">${done}/20</span></div></td>
      <td style="font-size:11px;color:var(--textd)">${s.createdAt||'—'}</td>
      <td style="display:flex;gap:5px;flex-wrap:wrap">
        <button class="btn-edit" onclick="editStudent('${uid}')">Өңдеу</button>
        <button class="btn-del" onclick="resetPass('${uid}')">Пароль</button>
        <button class="btn-del" onclick="delStudent('${uid}')">Жою</button>
      </td></tr>`;
  }).join('');
}
async function addStudent(){
  const name=document.getElementById('sName').value.trim();
  const login=document.getElementById('sLogin').value.trim();
  const pass=document.getElementById('sPass').value.trim();
  if(!name||!login||!pass){toast('Барлық өрістерді толтырыңыз',true);return;}
  if(pass.length<6){toast('Пароль кемінде 6 символ',true);return;}
  if(Object.values(STUDENTS).some(s=>s.login===login)){toast('Бұл логин бар',true);return;}
  const res=await fbPush('/students',{name,login,password:pass,createdAt:new Date().toLocaleDateString('kk-KZ')});
  if(res?.name)STUDENTS[res.name]={name,login,password:pass,createdAt:new Date().toLocaleDateString('kk-KZ')};
  ['sName','sLogin','sPass'].forEach(id=>document.getElementById(id).value='');
  toast('✓ '+name+' тіркелді');
  renderStudents(document.getElementById('mainContent'));
}
async function delStudent(uid){
  if(!confirm(`«${STUDENTS[uid]?.name}» студентін жоясыз ба?`))return;
  await Promise.all([fbDel('/students/'+uid),fbDel('/progress/'+uid)]);
  delete STUDENTS[uid];delete PROGRESS[uid];
  toast('Студент жойылды',true);
  renderStudents(document.getElementById('mainContent'));
}
async function resetPass(uid){
  const np=prompt(`«${STUDENTS[uid]?.name}» үшін жаңа пароль:`);
  if(!np)return;
  if(np.length<6){toast('Пароль кемінде 6 символ',true);return;}
  await fbSet('/students/'+uid+'/password',np);
  STUDENTS[uid].password=np;
  toast('✓ Пароль жаңартылды');
  renderStudents(document.getElementById('mainContent'));
}
async function editStudent(uid){
  const s=STUDENTS[uid];
  const name=prompt('Жаңа аты-жөні:',s.name);if(!name)return;
  const login=prompt('Жаңа логин:',s.login);if(!login)return;
  await fbPatch('/students/'+uid,{name,login});
  STUDENTS[uid].name=name;STUDENTS[uid].login=login;
  toast('✓ Өзгерістер сақталды');
  renderStudents(document.getElementById('mainContent'));
}

function renderSlides(m){
  m.innerHTML=`
    <div class="page-head"><div><div class="page-title">Слайдтар (PDF)</div><div class="page-sub">Әр сабаққа Google Drive PDF сілтемесін қосыңыз</div></div></div>
    <div class="info-box">
      📌 <strong>Нұсқаулық:</strong><br>
      1. Google Drive-қа PDF слайдты жүктеңіз<br>
      2. Файлға оң жақ батырма → «Share» → «Anyone with the link» → «Copy link»<br>
      3. Алынған сілтемені төменде тиісті сабаққа қойыңыз → «Сақтау»<br>
      4. Студент парақшасында слайд автоматты шығады
    </div>
    ${COURSE.map((w,wi)=>`
      <div class="card" style="border-left:3px solid ${w.color}">
        <div class="card-title" style="color:${w.color}">${w.id}-апта · ${w.title}</div>
        ${w.lessons.map((l,li)=>{
          const slideUrl=SLIDES_CONFIG[l.id]||'';
          const hasSlide=!!slideUrl;
          return`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border2)">
            <div style="font-size:11px;font-weight:600;color:var(--cyan);width:28px;font-family:monospace">${l.num}</div>
            <div style="font-size:13px;color:var(--text);width:180px;flex-shrink:0">${l.title}</div>
            <input class="form-input" id="slide-${wi}-${li}" value="${esc(slideUrl)}" placeholder="Google Drive PDF сілтемесі..." style="flex:1">
            <button class="btn-save" style="padding:6px 12px" onclick="saveSlide('${l.id}',${wi},${li})">Сақтау</button>
            <span style="font-size:12px;color:${hasSlide?'var(--green)':'var(--textd)'}">${hasSlide?'✓ Бар':'—'}</span>
          </div>`;
        }).join('')}
      </div>`).join('')}`;
}

async function saveSlide(lessonId,wi,li){
  let url=document.getElementById('slide-'+wi+'-'+li).value.trim();
  // Convert Google Drive share link to preview link
  if(url.includes('drive.google.com/file/d/')){
    const match=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
    if(match) url='https://drive.google.com/file/d/'+match[1]+'/preview';
  }else if(url.includes('drive.google.com')&&url.includes('id=')){
    const match=url.match(/id=([a-zA-Z0-9_-]+)/);
    if(match) url='https://drive.google.com/file/d/'+match[1]+'/preview';
  }
  SLIDES_CONFIG[lessonId]=url;
  await fbSet('/slidesConfig',SLIDES_CONFIG);
  document.getElementById('slide-'+wi+'-'+li).value=url;
  toast('✓ Слайд сілтемесі сақталды');
  renderSlides(document.getElementById('mainContent'));
}

function buildQuizEditor(wi,li){
  const quiz=COURSE[wi].lessons[li].quiz||[];
  if(!quiz.length)return'<p style="font-size:12px;color:var(--textd);padding:6px 0">Сұрақ жоқ</p>';
  return quiz.map((q,qi)=>`
    <div class="quiz-q-card">
      <div class="quiz-q-head">
        <span style="font-size:11px;font-weight:600;color:var(--textd)">Сұрақ ${qi+1}</span>
        <button class="btn-del" onclick="delQ(${wi},${li},${qi})">Жою</button>
      </div>
      <div class="coll-sec">СҰРАҚ МӘТІНІ</div>
      <input class="form-input" id="qq-${wi}-${li}-${qi}" value="${esc(q.q)}" style="margin-bottom:8px">
      <div class="coll-sec">ЖАУАП НҰСҚАЛАРЫ (дұрысын таңдаңыз)</div>
      ${(q.opts||[]).map((o,oi)=>`
        <div class="quiz-opt-row">
          <span class="quiz-opt-letter">${String.fromCharCode(65+oi)}</span>
          <input type="radio" class="quiz-radio" name="ans-${wi}-${li}-${qi}" value="${oi}" ${q.ans===oi?'checked':''}>
          <input class="form-input" id="qo-${wi}-${li}-${qi}-${oi}" value="${esc(o)}" style="flex:1">
        </div>`).join('')}
      <div class="coll-sec" style="margin-top:8px">ТҮСІНДІРМЕ</div>
      <input class="form-input" id="qe-${wi}-${li}-${qi}" value="${esc(q.exp||'')}" style="margin-bottom:8px">
      <button class="btn-save" onclick="saveQ(${wi},${li},${qi})">✓ Сақтау</button>
    </div>`).join('');
}
async function saveQ(wi,li,qi){
  const q=COURSE[wi].lessons[li].quiz[qi];
  q.q=document.getElementById(`qq-${wi}-${li}-${qi}`).value;
  q.exp=document.getElementById(`qe-${wi}-${li}-${qi}`).value;
  q.opts=q.opts.map((_,oi)=>document.getElementById(`qo-${wi}-${li}-${qi}-${oi}`).value);
  const checked=document.querySelector(`input[name="ans-${wi}-${li}-${qi}"]:checked`);
  if(checked)q.ans=parseInt(checked.value);
  await fbSet('/course',COURSE);
  toast(`✓ Сұрақ ${qi+1} сақталды`);
}
async function addQ(wi,li){
  if(!COURSE[wi].lessons[li].quiz)COURSE[wi].lessons[li].quiz=[];
  COURSE[wi].lessons[li].quiz.push({q:'Жаңа сұрақ',opts:['Жауап A','Жауап B','Жауап C','Жауап D'],ans:0,exp:'Түсіндірме'});
  await fbSet('/course',COURSE);
  document.getElementById(`ql-${wi}-${li}`).innerHTML=buildQuizEditor(wi,li);
  toast('+ Жаңа сұрақ қосылды');
}
async function delQ(wi,li,qi){
  if(!confirm('Сұрақты жоясыз ба?'))return;
  COURSE[wi].lessons[li].quiz.splice(qi,1);
  await fbSet('/course',COURSE);
  document.getElementById(`ql-${wi}-${li}`).innerHTML=buildQuizEditor(wi,li);
  toast('Сұрақ жойылды',true);

// ── PROGRESS ──────────────────────────────────────────────────────────────────
function renderProgress(m){
  const rows = Object.entries(STUDENTS).map(([uid,s])=>{
    const prog = PROGRESS[uid]||{};
    const done = Object.entries(prog).filter(([k,v])=>!k.includes('_quiz')&&v==='done').length;
    const pct = Math.round(done/20*100);

    const weekCells = COURSE.map(w=>{
      const wd = w.lessons.filter(l=>prog[l.id]==='done').length;
      const testLesson = w.lessons[w.lessons.length-1];
      const tk = testLesson.id+'_quiz';
      const histKey = testLesson.id+'_quiz_history';

      // Get history
      const histRaw = prog[histKey];
      const hist = histRaw ? (typeof histRaw==='string'?JSON.parse(histRaw):histRaw) : [];
      const histArr = Array.isArray(hist) ? hist : [];

      // Current state
      const ts = prog[tk] ? (typeof prog[tk]==='string'?JSON.parse(prog[tk]):prog[tk]) : null;
      const tp = ts?.submitted ? Math.round(ts.score/testLesson.quiz.length*100) : null;
      const passed = histArr.some(a=>a.passed);

      let histHtml = '';
      if(histArr.length > 0){
        histHtml = '<div style="margin-top:4px">' +
          histArr.map((a,i)=>
            '<div style="font-size:10px;color:'+(a.passed?'var(--green)':'#FCA5A5')+'">'+
            (i+1)+') '+(a.pct||Math.round(a.score/a.total*100))+'% '+
            (a.passed?'✓':'✗')+
            (a.date?' · '+a.date:'')+
            '</div>'
          ).join('') +
          '</div>';
      }

      return '<td style="vertical-align:top;padding:8px 12px">' +
        '<div style="font-size:11px;color:var(--textm);margin-bottom:3px">'+wd+'/'+w.lessons.length+' сабақ</div>' +
        (histArr.length>0 ?
          '<span class="badge '+(passed?'badge-green':'badge-red')+'" style="font-size:10px">' +
          'Тест: '+histArr.length+' рет</span>' +
          histHtml :
          '<span style="font-size:10px;color:var(--textd)">Тест жоқ</span>'
        ) +
        '</td>';
    }).join('');

    return '<tr>' +
      '<td style="font-weight:500;color:#fff;vertical-align:top">'+s.name+'</td>' +
      '<td style="vertical-align:top"><code style="color:var(--cyan);font-size:12px">'+s.login+'</code></td>' +
      weekCells +
      '<td style="vertical-align:top">' +
        '<div style="display:flex;align-items:center;gap:7px">' +
          '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>' +
          '<span style="font-size:12px;color:'+(pct===100?'var(--green)':'var(--textm)')+'">'+done+'/20</span>' +
        '</div>' +
      '</td>' +
      '<td style="vertical-align:top"><button class="btn-del" onclick="resetProg(\''+uid+'\')">Сифырлау</button></td>' +
      '</tr>';
  }).join('');

  m.innerHTML =
    '<div class="page-head"><div><div class="page-title">Студент прогресі</div><div class="page-sub">Тест нәтижелері · Тапсыру тарихы · Сабақ өту деңгейі</div></div>' +
    '<button class="btn-primary" onclick="refreshAdminData()">↻ Жаңарту</button></div>' +
    '<div class="card"><div class="tbl-wrap"><table>' +
    '<thead><tr><th>АТЫ-ЖӨНІ</th><th>ЛОГИН</th>' +
    COURSE.map(w=>'<th>'+w.id+'-АПТА</th>').join('') +
    '<th>ЖАЛПЫ</th><th></th></tr></thead>' +
    '<tbody>'+(rows||'<tr><td colspan="8" style="text-align:center;color:var(--textd);padding:20px">Студент жоқ</td></tr>')+'</tbody>' +
    '</table></div></div>';
}
async function resetProg(uid){
  if(!confirm(`«${STUDENTS[uid]?.name}» прогресін сифырлайсыз ба?`))return;
  await fbDel('/progress/'+uid);
  PROGRESS[uid]={};
  toast('Прогресс сифырланды',true);
  renderProgress(document.getElementById('mainContent'));
}

// ── POINTS MANAGEMENT ─────────────────────────────────────────────────────────
function getStudentPointsAdmin(prog){
  let testPoints=0, adminPoints=0;
  Object.entries(prog||{}).forEach(([k,v])=>{
    if(k.endsWith('_quiz_points')) testPoints += Number(v)||0;
  });
  const bonusRaw = prog['admin_bonus_points'];
  if(bonusRaw){
    const arr = typeof bonusRaw==='string'?JSON.parse(bonusRaw):bonusRaw;
    if(Array.isArray(arr)) arr.forEach(b=>{ adminPoints += Number(b.points)||0; });
  }
  return {testPoints, adminPoints, total: testPoints+adminPoints};
}

async function addBonus(uid){
  const ptsEl = document.getElementById('bonus-pts-'+uid);
  const reasonEl = document.getElementById('bonus-reason-'+uid);
  const pts = parseInt(ptsEl.value);
  const reason = reasonEl.value.trim();
  if(isNaN(pts)||pts===0){ toast('Балл мөлшерін енгізіңіз',true); return; }
  if(!reason){ toast('Түсіндірме жазыңыз',true); return; }

  const prog = PROGRESS[uid]||{};
  const bonusRaw = prog['admin_bonus_points'];
  let arr = bonusRaw?(typeof bonusRaw==='string'?JSON.parse(bonusRaw):bonusRaw):[];
  if(!Array.isArray(arr)) arr=[];
  arr.push({
    points: pts,
    reason: reason,
    date: new Date().toLocaleDateString('kk-KZ')+' '+new Date().toLocaleTimeString('kk-KZ',{hour:'2-digit',minute:'2-digit'})
  });

  await fbSet('/progress/'+uid+'/admin_bonus_points', JSON.stringify(arr));
  if(!PROGRESS[uid]) PROGRESS[uid]={};
  PROGRESS[uid]['admin_bonus_points'] = JSON.stringify(arr);
  ptsEl.value=''; reasonEl.value='';
  toast(pts>0?'✓ +'+pts+' балл қосылды':'✓ '+pts+' балл азайтылды');
  renderPoints(document.getElementById('mainContent'));
}

async function deleteBonus(uid,idx){
  if(!confirm('Бұл баллды жоясыз ба?')) return;
  const prog = PROGRESS[uid]||{};
  const bonusRaw = prog['admin_bonus_points'];
  let arr = bonusRaw?(typeof bonusRaw==='string'?JSON.parse(bonusRaw):bonusRaw):[];
  if(!Array.isArray(arr)) arr=[];
  arr.splice(idx,1);
  await fbSet('/progress/'+uid+'/admin_bonus_points', JSON.stringify(arr));
  if(!PROGRESS[uid]) PROGRESS[uid]={};
  PROGRESS[uid]['admin_bonus_points'] = JSON.stringify(arr);
  toast('Балл жойылды',true);
  renderPoints(document.getElementById('mainContent'));
}
