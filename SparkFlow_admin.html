<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SparkFlow Admin</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#060D1A;--navy2:#0A1628;--navy3:#0F2040;--navy4:#162a4a;
  --cyan:#00E5FF;--cyan2:#00BCD4;--cyan3:#80DEEA;
  --white:#FFF;--text:#E2E8F0;--textmid:#94A3B8;--textdim:#475569;
  --border:#1E3A5F;--border2:#0A2540;
  --green:#22C55E;--amber:#F59E0B;--red:#EF4444;--purple:#A78BFA;
  --font:'Space Grotesk',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--navy);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--navy2)}
::-webkit-scrollbar-thumb{background:var(--navy4);border-radius:3px}
input,textarea,select{font-family:var(--font)}
.page{display:none}
.page.active{display:block}

/* AUTH */
#authPage{min-height:100vh;display:flex;align-items:center;justify-content:center}
.auth-wrap{background:var(--navy2);border:1px solid var(--border2);border-radius:20px;padding:40px;width:100%;max-width:400px}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-bolt{width:52px;height:52px;background:var(--cyan);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:10px}
.auth-brand{font-size:20px;font-weight:700;color:var(--white)}
.auth-brand span{color:var(--cyan)}
.auth-sub{font-size:13px;color:var(--amber);margin-top:4px;font-weight:600}
.auth-title{font-size:18px;font-weight:600;color:var(--white);margin-bottom:20px;text-align:center}
.fl{font-size:11px;font-weight:600;color:var(--textmid);letter-spacing:.06em;display:block;margin-bottom:5px}
.fi{width:100%;background:var(--navy3);border:1px solid var(--border);color:var(--text);font-size:14px;padding:11px 14px;border-radius:9px;margin-bottom:12px;transition:border-color .15s}
.fi:focus{outline:none;border-color:var(--cyan2)}
.fi::placeholder{color:var(--textdim)}
.btn-p{width:100%;background:var(--cyan);color:var(--navy);font-family:var(--font);font-size:15px;font-weight:700;padding:13px;border-radius:10px;border:none;cursor:pointer;transition:all .2s}
.btn-p:hover{background:var(--cyan3)}
.btn-p:disabled{background:var(--navy4);color:var(--textdim);cursor:default}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#FCA5A5;font-size:13px;padding:10px 12px;border-radius:8px;margin-top:8px;display:none}
.err.show{display:block}

/* TOPBAR */
.topbar{
  position:sticky;top:0;z-index:100;background:rgba(6,13,26,.94);
  border-bottom:1px solid var(--border2);backdrop-filter:blur(12px);
  display:flex;align-items:center;height:56px;padding:0 20px;
}
.tb-logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.tb-bolt{width:28px;height:28px;background:var(--cyan);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px}
.tb-brand{font-size:15px;font-weight:700;color:var(--white)}
.tb-brand span{color:var(--cyan)}
.tb-badge{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:var(--amber);font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;margin-left:10px}
.tb-nav{display:flex;gap:2px;padding:0 12px;flex:1}
.tnav-btn{background:none;border:none;color:var(--textmid);font-family:var(--font);font-size:13px;font-weight:500;padding:6px 11px;border-radius:6px;cursor:pointer;transition:all .15s}
.tnav-btn:hover{color:var(--text);background:var(--navy3)}
.tnav-btn.active{color:var(--cyan);background:rgba(0,229,255,.08)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.tb-logout{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#FCA5A5;font-size:12px;padding:5px 11px;border-radius:6px;cursor:pointer;font-family:var(--font)}
.tb-logout:hover{background:rgba(239,68,68,.2)}

/* LAYOUT */
.admin-layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 56px)}
.admin-sidebar{background:var(--navy2);border-right:1px solid var(--border2);padding:16px 0;position:sticky;top:56px;max-height:calc(100vh-56px);overflow-y:auto}
.asb-section{padding:6px 14px 4px;font-size:10px;font-weight:600;color:var(--textdim);letter-spacing:.1em}
.asb-btn{
  display:flex;align-items:center;gap:9px;width:100%;padding:8px 14px;
  background:none;border:none;border-left:2px solid transparent;
  color:var(--textmid);font-family:var(--font);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .15s;text-align:left;
}
.asb-btn:hover{color:var(--text);background:var(--navy3)}
.asb-btn.active{color:var(--cyan);background:rgba(0,229,255,.06);border-left-color:var(--cyan)}
.asb-ico{font-size:15px;width:18px;text-align:center}
.admin-content{padding:28px 32px;max-width:1000px}

/* SECTION HEADER */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.sh h2{font-size:20px;font-weight:600;color:var(--white)}
.sh p{font-size:13px;color:var(--textmid);margin-top:3px}

/* CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--navy2);border:1px solid var(--border2);border-radius:10px;padding:16px}
.stat-val{font-size:26px;font-weight:700;color:var(--cyan)}
.stat-lbl{font-size:11px;color:var(--textmid);margin-top:3px}
.card{background:var(--navy2);border:1px solid var(--border2);border-radius:12px;padding:20px;margin-bottom:16px}
.card-head{font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-ico{font-size:16px;width:26px;height:26px;background:rgba(0,229,255,.1);border-radius:6px;display:flex;align-items:center;justify-content:center}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--navy3);color:var(--textmid);font-weight:600;padding:9px 12px;text-align:left;border-bottom:1px solid var(--border2);font-size:11px;letter-spacing:.05em}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border2);color:var(--text);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--navy3)}
.badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:99px;display:inline-block}
.badge-green{background:rgba(34,197,94,.12);color:var(--green)}
.badge-amber{background:rgba(245,158,11,.12);color:var(--amber)}
.badge-red{background:rgba(239,68,68,.12);color:var(--red)}
.badge-blue{background:rgba(0,229,255,.1);color:var(--cyan)}
.btn-sm{font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:var(--font);transition:all .15s;border:1px solid;font-weight:500}
.btn-edit{background:rgba(0,229,255,.08);border-color:rgba(0,229,255,.3);color:var(--cyan3)}
.btn-edit:hover{background:rgba(0,229,255,.15)}
.btn-del{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3);color:#FCA5A5}
.btn-del:hover{background:rgba(239,68,68,.15)}
.btn-pass{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.3);color:var(--amber)}
.btn-pass:hover{background:rgba(245,158,11,.15)}

/* FORM */
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.form-half{flex:1;min-width:180px}
label.fl{font-size:11px;font-weight:600;color:var(--textmid);letter-spacing:.06em;display:block;margin-bottom:5px}
.fi2{width:100%;background:var(--navy3);border:1px solid var(--border);color:var(--text);font-size:13px;padding:9px 12px;border-radius:8px;transition:border-color .15s}
.fi2:focus{outline:none;border-color:var(--cyan2)}
.fi2::placeholder{color:var(--textdim)}
textarea.fi2{resize:vertical;min-height:80px;line-height:1.6}
.btn-add{background:var(--cyan);color:var(--navy);font-family:var(--font);font-weight:700;font-size:13px;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;transition:all .2s}
.btn-add:hover{background:var(--cyan3)}
.btn-save{background:var(--green);color:#fff;font-family:var(--font);font-weight:700;font-size:13px;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;transition:all .2s}
.btn-save:hover{background:#16A34A}
.btn-cancel{background:none;border:1px solid var(--border);color:var(--textmid);font-family:var(--font);font-size:13px;padding:9px 16px;border-radius:8px;cursor:pointer}
.btn-cancel:hover{border-color:var(--textmid);color:var(--text)}

/* LESSON EDITOR */
.lesson-editor-list{display:flex;flex-direction:column;gap:10px}
.le-item{background:var(--navy3);border:1px solid var(--border2);border-radius:10px;overflow:hidden}
.le-head{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;transition:background .15s}
.le-head:hover{background:var(--navy4)}
.le-num{font-size:11px;font-weight:600;color:var(--cyan);font-family:var(--mono);width:28px}
.le-title{font-size:13px;font-weight:600;color:var(--text);flex:1}
.le-arr{font-size:10px;color:var(--textdim);transition:transform .2s}
.le-arr.open{transform:rotate(180deg)}
.le-body{display:none;padding:16px;border-top:1px solid var(--border2)}
.le-body.open{display:block}
.le-sec-title{font-size:10px;font-weight:600;color:var(--textmid);letter-spacing:.08em;margin-bottom:6px}
.quiz-editor-q{background:var(--navy2);border:1px solid var(--border2);border-radius:8px;padding:12px;margin-bottom:8px}
.qe-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.qe-qnum{font-size:11px;font-weight:600;color:var(--textdim)}
.quiz-opts-editor{display:flex;flex-direction:column;gap:5px;margin-top:6px}
.qoe-row{display:flex;align-items:center;gap:6px}
.qoe-letter{font-size:11px;font-weight:600;color:var(--textmid);width:16px}
.qoe-correct{width:16px;height:16px;cursor:pointer;accent-color:var(--green)}

/* PROGRESS TAB */
.prog-table-wrap{overflow-x:auto}
.prog-bar{height:6px;background:var(--navy4);border-radius:3px;overflow:hidden;min-width:80px}
.prog-bar-fill{height:100%;background:var(--cyan);border-radius:3px;transition:width .4s}

/* TOAST */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:1000;
  background:var(--green);color:#fff;font-size:13px;font-weight:600;
  padding:11px 18px;border-radius:10px;opacity:0;transition:opacity .3s;pointer-events:none;
}
.toast.show{opacity:1}
.toast.error{background:var(--red)}
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- AUTH PAGE -->
<div class="page active" id="authPage">
  <div class="auth-wrap">
    <div class="auth-logo">
      <div class="auth-bolt">⚡</div>
      <div class="auth-brand">Spark<span>Flow</span></div>
      <div class="auth-sub">⚙ Админ кабинеті</div>
    </div>
    <div class="auth-title">Кіру</div>
    <label class="fl">ЛОГИН</label>
    <input class="fi" type="text" id="adminLogin" placeholder="admin" autocomplete="username">
    <label class="fl">ПАРОЛЬ</label>
    <input class="fi" type="password" id="adminPass" placeholder="Пароль" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAdminLogin()">
    <button class="btn-p" id="loginBtn" onclick="doAdminLogin()">Кіру →</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- ADMIN APP -->
<div class="page" id="adminPage">
  <div class="topbar">
    <a class="tb-logo" href="#">
      <div class="tb-bolt">⚡</div>
      <span class="tb-brand">Spark<span>Flow</span></span>
    </a>
    <span class="tb-badge">⚙ Админ</span>
    <nav class="tb-nav" style="margin-left:16px">
      <button class="tnav-btn active" id="nav-dash" onclick="showTab('dashboard')">Басты бет</button>
      <button class="tnav-btn" id="nav-students" onclick="showTab('students')">Студенттер</button>
      <button class="tnav-btn" id="nav-lessons" onclick="showTab('lessons')">Сабақтар</button>
      <button class="tnav-btn" id="nav-progress" onclick="showTab('progress')">Прогресс</button>
    </nav>
    <div class="tb-right">
      <a href="index.html" target="_blank" style="font-size:12px;color:var(--textmid);text-decoration:none">Студент сайты →</a>
      <button class="tb-logout" onclick="doAdminLogout()">Шығу</button>
    </div>
  </div>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="asb-section" style="margin-top:8px">БАСҚАРУ</div>
      <button class="asb-btn active" id="sb-dashboard" onclick="showTab('dashboard')"><span class="asb-ico">📊</span>Басқару тақтасы</button>
      <button class="asb-btn" id="sb-students" onclick="showTab('students')"><span class="asb-ico">👥</span>Студенттер</button>
      <button class="asb-btn" id="sb-progress" onclick="showTab('progress')"><span class="asb-ico">📈</span>Прогресс</button>
      <div class="asb-section" style="margin-top:12px">МАЗМҰН</div>
      <button class="asb-btn" id="sb-lessons" onclick="showTab('lessons')"><span class="asb-ico">📚</span>Сабақтарды өңдеу</button>
      <button class="asb-btn" id="sb-quizzes" onclick="showTab('quizzes')"><span class="asb-ico">⚡</span>Тест сұрақтары</button>
      <button class="asb-btn" id="sb-videos" onclick="showTab('videos')"><span class="asb-ico">▶</span>Видео сілтемелер</button>
      <div class="asb-section" style="margin-top:12px">ЖҮЙЕ</div>
      <button class="asb-btn" id="sb-settings" onclick="showTab('settings')"><span class="asb-ico">⚙</span>Баптаулар</button>
    </aside>

    <main class="admin-content" id="adminMain">
      <p style="color:var(--textmid)">Жүктелуде...</p>
    </main>
  </div>
</div>

<script>
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
const ADMIN_LOGIN = 'admin';
let adminLoggedIn = false;
let COURSE = null;
let STUDENTS = {};
let PROGRESS = {};

// ─── AUTH ─────────────────────────────────────────────────────────────────────
async function doAdminLogin(){
  const login = document.getElementById('adminLogin').value.trim();
  const pass = document.getElementById('adminPass').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginErr');

  if(!login || !pass){
    errEl.textContent='Логин мен пароль енгізіңіз';
    errEl.style.display='block';
    return;
  }

  btn.disabled=true; btn.textContent='Тексерілуде...';
  errEl.style.display='none';

  try {
    const snap = await db.ref('adminCredentials').once('value');
    let creds = snap.val();
    if(!creds){ creds = {login:'admin', password:'sparkflow2024'}; }
    if(login === creds.login && pass === creds.password){
      adminLoggedIn = true;
      document.getElementById('authPage').classList.remove('active');
      document.getElementById('adminPage').classList.add('active');
      await loadAllData();
      showTab('dashboard');
    } else {
      errEl.textContent = 'Логин немесе пароль қате';
      errEl.style.display='block';
    }
  } catch(err){
    errEl.textContent = 'Қосылу қатесі: ' + err.message;
    errEl.style.display='block';
    console.error('Login error:', err);
  }
  btn.disabled=false; btn.textContent='Кіру →';
}

function doAdminLogout(){
  adminLoggedIn=false;
  document.getElementById('adminPage').classList.remove('active');
  document.getElementById('authPage').classList.add('active');
  document.getElementById('adminPass').value='';
}

async function loadAllData(){
  // Course
  const cSnap = await db.ref('course').once('value');
  COURSE = cSnap.val() || getDefaultCourse();
  // Students
  const sSnap = await db.ref('students').once('value');
  STUDENTS = sSnap.val() || {};
  // Progress
  const pSnap = await db.ref('progress').once('value');
  PROGRESS = pSnap.val() || {};
}

// ─── TAB NAVIGATION ───────────────────────────────────────────────────────────
function showTab(tab){
  document.querySelectorAll('.tnav-btn,.asb-btn').forEach(b=>b.classList.remove('active'));
  const navEl = document.getElementById('nav-'+tab);
  const sbEl = document.getElementById('sb-'+tab);
  if(navEl) navEl.classList.add('active');
  if(sbEl) sbEl.classList.add('active');
  const m = document.getElementById('adminMain');

  if(tab==='dashboard') renderDashboard(m);
  else if(tab==='students') renderStudents(m);
  else if(tab==='lessons') renderLessons(m);
  else if(tab==='quizzes') renderQuizzes(m);
  else if(tab==='videos') renderVideos(m);
  else if(tab==='progress') renderProgress(m);
  else if(tab==='settings') renderSettings(m);
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDashboard(m){
  const sCount = Object.keys(STUDENTS).length;
  const totalLessons = COURSE.reduce((a,w)=>a+w.lessons.length,0);
  let doneCount = 0;
  Object.values(PROGRESS).forEach(p=>{ Object.entries(p).forEach(([k,v])=>{ if(!k.includes('_quiz')&&v==='done') doneCount++; }); });
  m.innerHTML = `
    <div class="sh"><div><h2>Басқару тақтасы</h2><p>SparkFlow Academy — жалпы ақпарат</p></div></div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-val">${sCount}</div><div class="stat-lbl">Студент</div></div>
      <div class="stat-card"><div class="stat-val">${totalLessons}</div><div class="stat-lbl">Сабақ</div></div>
      <div class="stat-card"><div class="stat-val">${doneCount}</div><div class="stat-lbl">Аяқталған сабақтар</div></div>
      <div class="stat-card"><div class="stat-val">4</div><div class="stat-lbl">Апта</div></div>
    </div>
    <div class="card">
      <div class="card-head"><div class="card-ico">📊</div>Жақындағы белсенділік</div>
      <p style="font-size:13px;color:var(--textmid)">Студенттерді «Студенттер» беттен, прогресті «Прогресс» беттен қараңыз.</p>
      <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn-add" onclick="showTab('students')">Студенттерді басқару →</button>
        <button style="background:var(--navy3);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:13px;padding:9px 16px;border-radius:8px;cursor:pointer" onclick="showTab('lessons')">Сабақтарды өңдеу →</button>
      </div>
    </div>`;
}

// ─── STUDENTS ────────────────────────────────────────────────────────────────
function renderStudents(m){
  m.innerHTML = `
    <div class="sh">
      <div><h2>Студенттер</h2><p>Тіркеу, өзгерту, жою</p></div>
      <button class="btn-add" onclick="showAddStudentForm()">+ Студент қосу</button>
    </div>
    <div id="studentFormWrap"></div>
    <div class="card">
      <div class="card-head"><div class="card-ico">👥</div>Тіркелген студенттер</div>
      <div class="prog-table-wrap">
        <table class="tbl">
          <thead><tr>
            <th>АТЫ-ЖӨНІ</th><th>ЛОГИН</th><th>ПАРОЛЬ</th><th>ПРОГРЕСС</th><th>ТІРКЕЛГЕН</th><th>ӘРЕКЕТ</th>
          </tr></thead>
          <tbody id="studentsTbody">${buildStudentRows()}</tbody>
        </table>
      </div>
    </div>`;
}

function buildStudentRows(){
  if(Object.keys(STUDENTS).length===0) return '<tr><td colspan="6" style="text-align:center;color:var(--textdim);padding:24px">Студент жоқ — «+ Студент қосу» батырмасын басыңыз</td></tr>';
  return Object.entries(STUDENTS).map(([uid,s])=>{
    const prog = PROGRESS[uid] || {};
    const done = Object.entries(prog).filter(([k,v])=>!k.includes('_quiz')&&v==='done').length;
    const pct = Math.round(done/20*100);
    return `<tr>
      <td style="font-weight:500;color:var(--white)">${s.name}</td>
      <td><code style="font-family:var(--mono);font-size:12px;color:var(--cyan)">${s.login}</code></td>
      <td><code style="font-family:var(--mono);font-size:12px;color:var(--textmid)">${s.password}</code></td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="prog-bar"><div class="prog-bar-fill" style="width:${pct}%"></div></div>

function showAddStudentForm(){
  document.getElementById('studentFormWrap').innerHTML = `
    <div class="card" style="border-color:var(--cyan2);margin-bottom:16px">
      <div class="card-head"><div class="card-ico">➕</div>Жаңа студент қосу</div>
      <div class="form-row">
        <div class="form-half">
          <label class="fl">АТЫ-ЖӨНІ</label>
          <input class="fi2" id="sName" placeholder="Аты-жөні (мысалы: Сырым Азиз)" autocomplete="off">
        </div>
        <div class="form-half">
          <label class="fl">ЛОГИН</label>
          <input class="fi2" id="sLogin" placeholder="syrymaziz (латын, бос орынсыз)" autocomplete="off">
        </div>
      </div>
      <div class="form-row">
        <div class="form-half">
          <label class="fl">ПАРОЛЬ</label>
          <input class="fi2" id="sPass" placeholder="Кемінде 6 символ" type="text">
        </div>
        <div class="form-half" style="display:flex;align-items:flex-end;gap:8px;padding-bottom:0">

        </div>

      <div class="err" id="sErr"></div>

async function addStudent(){
  const name = document.getElementById('sName').value.trim();
  const login = document.getElementById('sLogin').value.trim();
  const pass = document.getElementById('sPass').value.trim();
  const err = document.getElementById('sErr');

  if(!name||!login||!pass){ err.textContent='Барлық өрістерді толтырыңыз'; err.classList.add('show'); return; }
  if(pass.length<6){ err.textContent='Пароль кемінде 6 символ болуы керек'; err.classList.add('show'); return; }

  // Check login unique
  const exists = Object.values(STUDENTS).some(s=>s.login===login);
  if(exists){ err.textContent='Бұл логин бар — басқа логин таңдаңыз'; err.classList.add('show'); return; }

  const uid = 'stu_' + Date.now();
  const student = { name, login, password:pass, createdAt: new Date().toLocaleDateString('kk-KZ') };
  await db.ref(`students/${uid}`).set(student);
  STUDENTS[uid] = student;

  document.getElementById('studentFormWrap').innerHTML='';
  document.getElementById('studentsTbody').innerHTML = buildStudentRows();
  document.getElementById('stat-grid') && renderDashboard(document.getElementById('adminMain'));
  showToast(`✓ ${name} тіркелді. Логин: ${login}`);
}

async function deleteStudent(uid){
  const s = STUDENTS[uid];
  if(!confirm(`«${s.name}» студентін жоясыз ба?\nБарлық прогресс деректері де жойылады!`)) return;
  await db.ref(`students/${uid}`).remove();
  await db.ref(`progress/${uid}`).remove();
  delete STUDENTS[uid]; delete PROGRESS[uid];
  document.getElementById('studentsTbody').innerHTML = buildStudentRows();
  showToast('Студент жойылды', true);
}

function showEditStudent(uid){
  const s = STUDENTS[uid];
  document.getElementById('studentFormWrap').innerHTML = `
    <div class="card" style="border-color:var(--amber);margin-bottom:16px">
      <div class="card-head"><div class="card-ico">✏</div>Студентті өңдеу — ${s.name}</div>
      <div class="form-row">
        <div class="form-half">
          <label class="fl">АТЫ-ЖӨНІ</label>
          <input class="fi2" id="editName" value="${s.name}">
        </div>
        <div class="form-half">
          <label class="fl">ЛОГИН</label>
          <input class="fi2" id="editLogin" value="${s.login}">
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn-save" onclick="saveStudent('${uid}')">Сақтау</button>
        <button class="btn-cancel" onclick="document.getElementById('studentFormWrap').innerHTML=''">Бас тарту</button>
      </div>
    </div>`;
}

async function saveStudent(uid){
  const name = document.getElementById('editName').value.trim();
  const login = document.getElementById('editLogin').value.trim();
  if(!name||!login){showToast('Өрістерді толтырыңыз',true);return;}
  await db.ref(`students/${uid}`).update({name, login});
  STUDENTS[uid].name=name; STUDENTS[uid].login=login;
  document.getElementById('studentFormWrap').innerHTML='';
  document.getElementById('studentsTbody').innerHTML = buildStudentRows();
  showToast('✓ Өзгерістер сақталды');
}

async function resetStudentPass(uid){
  const newPass = prompt(`«${STUDENTS[uid].name}» үшін жаңа пароль:`);
  if(!newPass || newPass.length<6){if(newPass!==null) alert('Пароль кемінде 6 символ'); return;}
  await db.ref(`students/${uid}/password`).set(newPass);
  STUDENTS[uid].password = newPass;
  document.getElementById('studentsTbody').innerHTML = buildStudentRows();
  showToast('✓ Пароль жаңартылды');
}

function toggleLE(id, headEl){
  const body = document.getElementById(id);

  }

async function saveLesson(wi,li){
  const l = COURSE[wi].lessons[li];
  l.title = document.getElementById(`lt-${wi}-${li}`).value;
  l.meta = document.getElementById(`lm-${wi}-${li}`).value;
  l.script = document.getElementById(`ls-${wi}-${li}`).value;
  l.hw = document.getElementById(`lh-${wi}-${li}`).value;

// ─── QUIZ EDITOR ─────────────────────────────────────────────────────────────
function renderQuizzes(m){
  m.innerHTML = `
    <div class="sh"><div><h2>Тест сұрақтары</h2><p>Сұрақтарды өзгерту, қосу, жою</p></div></div>
    ${COURSE.map((w,wi)=>`
      <div class="card" style="border-left:3px solid ${w.color};margin-bottom:16px">
        <div class="card-head" style="color:${w.color}">${w.id}-апта тесттері</div>
        ${w.lessons.map((l,li)=>`
          <div class="le-item" style="margin-bottom:8px">
            <div class="le-head" onclick="toggleLE('qe-${wi}-${li}',this)">
              <div class="le-num">${l.num}</div>
              <div class="le-title">${l.title}</div>
              <span class="badge badge-blue" style="margin-right:8px">${l.quiz.length} сұрақ</span>
              <div class="le-arr">▼</div>
            </div>

            </div>
          </div>`).join('')}
      </div>`).join('')}`;

function buildQuizEditor(wi,li){
  const quiz = COURSE[wi].lessons[li].quiz;
  if(quiz.length===0) return '<p style="font-size:12px;color:var(--textdim);padding:8px 0">Сұрақ жоқ — «+ Сұрақ қосу» батырмасын басыңыз</p>';
  return quiz.map((q,qi)=>`
    <div class="quiz-editor-q">
      <div class="qe-head">
        <div class="qe-qnum">Сұрақ ${qi+1}</div>
        <button class="btn-sm btn-del" onclick="removeQuestion(${wi},${li},${qi})">Жою</button>
      </div>
      <div class="le-sec-title">СҰРАҚ МӘТІНІ</div>
      <input class="fi2" id="qq-${wi}-${li}-${qi}" value="${esc(q.q)}" style="margin-bottom:8px">
      <div class="le-sec-title">ЖАУАП НҰСҚАЛАРЫ (дұрысын таңдаңыз)</div>
      <div class="quiz-opts-editor">
        ${q.opts.map((o,oi)=>`
          <div class="qoe-row">
            <span class="qoe-letter">${String.fromCharCode(65+oi)}</span>
            <input type="radio" class="qoe-correct" name="qans-${wi}-${li}-${qi}" value="${oi}" ${q.ans===oi?'checked':''} id="qans-${wi}-${li}-${qi}-${oi}">
            <input class="fi2" id="qo-${wi}-${li}-${qi}-${oi}" value="${esc(o)}" style="flex:1">
          </div>`).join('')}
      </div>
      <div class="le-sec-title" style="margin-top:8px">ТҮСІНДІРМЕ</div>
      <input class="fi2" id="qexp-${wi}-${li}-${qi}" value="${esc(q.exp)}" style="margin-bottom:8px">
      <button class="btn-save" style="margin-top:4px" onclick="saveQuestion(${wi},${li},${qi})">✓ Сақтау</button>
    </div>`).join('');
}

async function saveQuestion(wi,li,qi){
  const q = COURSE[wi].lessons[li].quiz[qi];
  q.q = document.getElementById(`qq-${wi}-${li}-${qi}`).value;
  q.exp = document.getElementById(`qexp-${wi}-${li}-${qi}`).value;
  q.opts = q.opts.map((_,oi)=>document.getElementById(`qo-${wi}-${li}-${qi}-${oi}`).value);
  const checked = document.querySelector(`input[name="qans-${wi}-${li}-${qi}"]:checked`);
  if(checked) q.ans = parseInt(checked.value);
  await db.ref('course').set(COURSE);
  showToast(`✓ Сұрақ ${qi+1} сақталды`);
}

function addQuestion(wi,li){
  COURSE[wi].lessons[li].quiz.push({
    q:'Жаңа сұрақ мәтіні',
    opts:['Жауап A','Жауап B','Жауап C','Жауап D'],
    ans:0, exp:'Түсіндірме'
  });
  document.getElementById(`qlist-${wi}-${li}`).innerHTML = buildQuizEditor(wi,li);
  db.ref('course').set(COURSE);
  showToast('+ Жаңа сұрақ қосылды');
}

async function removeQuestion(wi,li,qi){
  if(!confirm('Сұрақты жоясыз ба?')) return;
  COURSE[wi].lessons[li].quiz.splice(qi,1);
  await db.ref('course').set(COURSE);
  document.getElementById(`qlist-${wi}-${li}`).innerHTML = buildQuizEditor(wi,li);
  showToast('Сұрақ жойылды',true);
}

async function saveVideo(wi,li){

// ─── PROGRESS ────────────────────────────────────────────────────────────────
function renderProgress(m){
  const rows = Object.entries(STUDENTS).map(([uid,s])=>{
    const prog = PROGRESS[uid]||{};
    const done = Object.entries(prog).filter(([k,v])=>!k.includes('_quiz')&&v==='done').length;
    const pct = Math.round(done/20*100);
    const weekDone = COURSE.map(w=>{
      const wDone = w.lessons.filter(l=>prog[l.id]==='done').length;
      const testKey = w.lessons[w.lessons.length-1].id+'_quiz';
      const testState = prog[testKey]?JSON.parse(prog[testKey]):null;
      const testPct = testState&&testState.submitted?Math.round(testState.score/w.lessons[w.lessons.length-1].quiz.length*100):null;
      return {done:wDone,total:w.lessons.length,testPct};
    });
    return `<tr>
      <td style="font-weight:500;color:var(--white)">${s.name}</td>
      <td><code style="font-family:var(--mono);font-size:11px;color:var(--cyan)">${s.login}</code></td>
      ${weekDone.map(w=>`<td>
        <div style="font-size:11px;color:var(--textmid)">${w.done}/${w.total}</div>
        ${w.testPct!==null?`<div class="badge ${w.testPct>=70?'badge-green':'badge-red'}" style="margin-top:3px">Тест: ${w.testPct}%</div>`:`<div style="font-size:10px;color:var(--textdim)">Тест жоқ</div>`}
      </td>`).join('')}
      <td>
        <div style="display:flex;align-items:center;gap:7px">
          <div class="prog-bar"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
          <span style="font-size:12px;white-space:nowrap;color:${pct===100?'var(--green)':'var(--textmid)'}">${done}/20</span>
        </div>
      </td>
      <td><button class="btn-sm btn-del" onclick="resetProgress('${uid}')">Сифырлау</button></td>
    </tr>`;
  }).join('');

  m.innerHTML = `
    <div class="sh"><div><h2>Студент прогресі</h2><p>Тест нәтижелері мен сабақ өту деңгейі</p></div></div>
    <div class="card">
      <div class="prog-table-wrap">
        <table class="tbl">
          <thead><tr>
            <th>АТЫ-ЖӨНІ</th><th>ЛОГИН</th>
            ${COURSE.map(w=>`<th>${w.id}-АПТА</th>`).join('')}
            <th>ЖАЛПЫ</th><th></th>
          </tr></thead>
          <tbody>${rows||'<tr><td colspan="8" style="text-align:center;color:var(--textdim);padding:20px">Студент жоқ</td></tr>'}</tbody>
        </table>
      </div>
    </div>`;
}

async function resetProgress(uid){
  if(!confirm(`«${STUDENTS[uid].name}» студентінің прогресін сифырлайсыз ба?`)) return;
  await db.ref(`progress/${uid}`).remove();
  PROGRESS[uid] = {};
  renderProgress(document.getElementById('adminMain'));
  showToast('Прогресс сифырланды',true);
}

async function saveAdminCreds(){
  const login = document.getElementById('newAdminLogin').value.trim();
  const pass = document.getElementById('newAdminPass').value;
  if(!login&&!pass){showToast('Кемінде бір өрісті толтырыңыз',true);return;}
  const update={};
  if(login) update.login=login;
  if(pass) update.password=pass;
  await db.ref('adminCredentials').update(update);
  showToast('✓ Админ тіркелгісі жаңартылды');
}

function exportData(){
  const data = JSON.stringify({students:STUDENTS, progress:PROGRESS, course:COURSE}, null, 2);
  const blob = new Blob([data],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='sparkflow_backup.json'; a.click();
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function esc(s){ return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showToast(msg, isError=false){
  const t = document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(isError?' error':'')+' show';
  setTimeout(()=>t.classList.remove('show'),3000);
}

function getDefaultCourse(){

  ]}];
}
